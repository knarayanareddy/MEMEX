# ═══════════════════════════════════════════════════════════════
# MEMEX CI Pipeline
# ═══════════════════════════════════════════════════════════════
# Stage 1: Static Analysis (lint, type check, invariant scan)
# Stage 2: Unit Tests
# Stage 3: Integration Tests
# Stage 4: Eval Tests
# ALL STAGES MUST PASS on main. No stage can be skipped.
# ═══════════════════════════════════════════════════════════════

name: MEMEX CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.13"
  MEMEX_DATA_DIR: /tmp/memex-ci

jobs:
  # ─── Stage 1: Static Analysis ──────────────────────────────
  static-analysis:
    name: "Stage 1: Static Analysis"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check memex/ tests/

      - name: Type check (mypy)
        run: mypy memex/ --ignore-missing-imports || true
        continue-on-error: true

      - name: Config hygiene scan (INV-026 to INV-029)
        run: |
          python -m pytest tests/invariants/test_config_hygiene.py -v

  # ─── Stage 2: Unit Tests ───────────────────────────────────
  unit-tests:
    name: "Stage 2: Unit Tests"
    runs-on: ubuntu-latest
    needs: static-analysis
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Download spaCy model
        run: python -m spacy download en_core_web_sm

      - name: Run unit tests
        run: |
          python -m pytest tests/unit/ -v \
            --tb=short \
            -x

  # ─── Stage 3: Integration Tests ────────────────────────────
  integration-tests:
    name: "Stage 3: Integration + Invariant Tests"
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Download spaCy model
        run: python -m spacy download en_core_web_sm

      - name: Run invariant tests
        run: |
          python -m pytest tests/invariants/ -v \
            --tb=short

      - name: Run integration tests
        run: |
          python -m pytest tests/integration/ -v \
            --tb=short

      - name: Run full test suite with coverage
        run: |
          python -m pytest tests/ \
            --cov=memex \
            --cov-report=term-missing \
            --cov-report=xml \
            --tb=short \
            -q

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
